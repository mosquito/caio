name: publish

on:
  release:
    types: [published]

jobs:
  sdist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz

  wheels-linux-x86_64:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_34_x86_64
    permissions:
      contents: write
    strategy:
      matrix:
        python: [cp310-cp310, cp311-cp311, cp312-cp312, cp313-cp313, cp314-cp314]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheel
        run: |
          /opt/python/${{ matrix.python }}/bin/pip install -U setuptools wheel
          /opt/python/${{ matrix.python }}/bin/pip wheel . --no-build-isolation --no-deps -w /tmp/raw/
          auditwheel repair /tmp/raw/caio-*.whl -w dist/ && rm /tmp/raw/caio-*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64-${{ matrix.python }}
          path: dist/*.whl
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  wheels-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    container: quay.io/pypa/manylinux_2_34_aarch64
    permissions:
      contents: write
    strategy:
      matrix:
        python: [cp310-cp310, cp311-cp311, cp312-cp312, cp313-cp313, cp314-cp314]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheel
        run: |
          /opt/python/${{ matrix.python }}/bin/pip install -U setuptools wheel
          /opt/python/${{ matrix.python }}/bin/pip wheel . --no-build-isolation --no-deps -w /tmp/raw/
          auditwheel repair /tmp/raw/caio-*.whl -w dist/ && rm /tmp/raw/caio-*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-aarch64-${{ matrix.python }}
          path: dist/*.whl
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  wheels-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"
      - run: pip install build
      - run: python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-${{ matrix.python }}
          path: dist/*.whl
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  wheels-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows
          path: dist/*.whl
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  pypi:
    needs: [sdist, wheels-linux-x86_64, wheels-linux-aarch64, wheels-macos, wheels-windows]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'wheel-*'
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
